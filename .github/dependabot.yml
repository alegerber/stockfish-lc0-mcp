version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Dependabot understands the
  # `@<sha> # vX` pin format and opens grouped bump PRs (with changelogs), so the
  # pins gain immutability AND timely security updates — the combination that
  # makes pinning worthwhile (see #34/#35).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      # Minor/patch action bumps are low-risk → batch them into one PR.
      actions-minor:
        patterns: ['*']
        update-types: ['minor', 'patch']
      # MAJOR bumps are intentionally NOT grouped: each one falls back to
      # Dependabot's default (one PR per action), so a potentially breaking
      # major is reviewed on its own. This matters because release.yml is not
      # exercised by PR CI — it only runs on a tag push or manual dispatch
      # (see #44, which grouped 5 majors into a single PR). — #45
