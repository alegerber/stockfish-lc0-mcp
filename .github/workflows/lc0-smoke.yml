name: Lc0 smoke test

# Manual-only: builds the full image (compiles Lc0 from source + downloads the
# Maia-1900 network), which is too slow for every push. Trigger on demand from
# the Actions tab to verify the lc0_* tools end-to-end over the MCP stdio transport.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-lc0:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (MCP smoke client)
        run: npm ci

      - name: Build full image (Stockfish + Lc0 + Maia-1900)
        run: docker build -t stockfish-lc0-mcp .

      - name: Lc0 smoke test (MCP server over stdio)
        run: SMOKE_DOCKER_IMAGE=stockfish-lc0-mcp node scripts/smoke-test.mjs
