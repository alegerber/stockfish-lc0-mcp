name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Run integration tests in Docker
        run: docker compose -f docker-compose.test.yml run --rm integration-test

  smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends stockfish

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke test (MCP server over stdio)
        run: npm run smoke
        env:
          STOCKFISH_PATH: /usr/games/stockfish
