name: Release

# Stable tag push (vX.Y.Z) → build each arch on a NATIVE runner, gate each on the
# full E2E, push per-arch by digest, assemble a multi-arch manifest (:version +
# :latest), publish to npm (OIDC trusted publishing), and cut a GitHub Release.
# Manual dispatch is a DRY RUN: it builds and E2E-tests both arches natively and
# packs the npm tarball, but publishes nothing.
#
# Prereleases are intentionally NOT published — the trigger matches stable semver
# only.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.v.outputs.version }}
      publish: ${{ steps.v.outputs.publish }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve version & publish mode
        id: v
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
              exit 1
            fi
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "→ version=$PKG_VERSION  publish=$([ "${{ github.event_name }}" = push ] && echo true || echo false)"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse to overwrite an already-published version
        if: github.event_name == 'push'
        run: |
          if docker buildx imagetools inspect "${IMAGE}:${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::${IMAGE}:${{ steps.v.outputs.version }} already exists in GHCR — bump the version before tagging"
            exit 1
          fi
          echo "→ ${IMAGE}:${{ steps.v.outputs.version }} not yet published — proceeding"

  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Native build (no QEMU) loaded into the daemon so the E2E gate runs a real
      # container of THIS arch before anything is published.
      - name: Build ${{ matrix.arch }} image (load for testing)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.IMAGE }}:test-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: E2E gate (${{ matrix.arch }}) — all 8 tools against the native image
        run: SMOKE_DOCKER_IMAGE=${{ env.IMAGE }}:test-${{ matrix.arch }} node scripts/smoke-test.mjs

      - name: Log in to GHCR
        if: needs.guard.outputs.publish == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.arch }} by digest
        id: push
        if: needs.guard.outputs.publish == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        if: needs.guard.outputs.publish == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          # Strip the "sha256:" prefix — the merge step re-adds it via @sha256:.
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.guard.outputs.publish == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [guard, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # write the multi-arch manifest tag
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble multi-arch manifest (:version + :latest)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.guard.outputs.version }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE}:${{ needs.guard.outputs.version }}"

  # Gated on the same per-arch E2E as the Docker push (via `needs: build`).
  # Auth is npm Trusted Publishing: GitHub's OIDC token is exchanged for a
  # publish credential at run time — no NPM_TOKEN secret exists to steal.
  # Provenance attestation is automatic with trusted publishing.
  npm-publish:
    needs: [guard, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Node 24 bundles a new-enough npm — assert instead of pulling a moving
      # npm@latest into the publish job at release time.
      - name: Assert npm >= 11.5.1 (trusted-publishing floor)
        run: |
          node -e '
            const [maj, min, pat] = process.argv[1].split(".").map(Number);
            const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && pat >= 1)));
            if (!ok) { console.error("npm", process.argv[1], "< 11.5.1 — trusted publishing unsupported"); process.exit(1); }
          ' "$(npm -v)"

      - run: npm ci

      - name: Verify the tarball ships the bin (dry run)
        run: |
          npm pack --dry-run --json > "$RUNNER_TEMP/pack.json"
          node -e '
            const files = require(process.argv[1])[0].files.map((f) => f.path);
            if (!files.includes("dist/index.js")) {
              console.error("dist/index.js (bin target) missing from tarball:", files);
              process.exit(1);
            }
            console.log("tarball OK —", files.length, "files, bin present");
          ' "$RUNNER_TEMP/pack.json"

      # Skip (don't fail) when the version is already on npm so a partial-failure
      # re-run of the same tag can still recover the Docker/Release side.
      # First-ever publish must be done manually once: npm trusted publishing
      # can only be configured for a package that already exists.
      - name: Publish to npm
        if: needs.guard.outputs.publish == 'true'
        run: |
          V="${{ needs.guard.outputs.version }}"
          if npm view "stockfish-lc0-mcp@${V}" version >/dev/null 2>&1; then
            echo "stockfish-lc0-mcp@${V} already on npm — skipping (idempotent re-run)"
            exit 0
          fi
          npm publish

  # Create the GitHub Release only after BOTH registries succeeded — its notes
  # advertise the Docker tag and the npx command, so neither may be missing.
  release:
    needs: [guard, merge, npm-publish]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Container image: \`docker pull ${IMAGE}:${{ needs.guard.outputs.version }}\` (also tagged \`latest\`; linux/amd64 + linux/arm64). npm package: \`npx stockfish-lc0-mcp@${{ needs.guard.outputs.version }}\`."
