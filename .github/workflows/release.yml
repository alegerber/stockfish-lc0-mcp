name: Release

# Stable tag push (vX.Y.Z) → build each arch on a NATIVE runner, gate each on the
# full E2E, push per-arch by digest, assemble a multi-arch manifest (:version +
# :latest), and cut a GitHub Release. Manual dispatch is a DRY RUN: it builds and
# E2E-tests both arches natively but pushes nothing.
#
# Prereleases are intentionally NOT published — the trigger matches stable semver
# only.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.v.outputs.version }}
      publish: ${{ steps.v.outputs.publish }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve version & publish mode
        id: v
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
              exit 1
            fi
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "→ version=$PKG_VERSION  publish=$([ "${{ github.event_name }}" = push ] && echo true || echo false)"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse to overwrite an already-published version
        if: github.event_name == 'push'
        run: |
          if docker buildx imagetools inspect "${IMAGE}:${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::${IMAGE}:${{ steps.v.outputs.version }} already exists in GHCR — bump the version before tagging"
            exit 1
          fi
          echo "→ ${IMAGE}:${{ steps.v.outputs.version }} not yet published — proceeding"

  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Native build (no QEMU) loaded into the daemon so the E2E gate runs a real
      # container of THIS arch before anything is published.
      - name: Build ${{ matrix.arch }} image (load for testing)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.IMAGE }}:test-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: E2E gate (${{ matrix.arch }}) — all 8 tools against the native image
        run: SMOKE_DOCKER_IMAGE=${{ env.IMAGE }}:test-${{ matrix.arch }} node scripts/smoke-test.mjs

      - name: Log in to GHCR
        if: needs.guard.outputs.publish == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push ${{ matrix.arch }} by digest
        id: push
        if: needs.guard.outputs.publish == 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        if: needs.guard.outputs.publish == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          # Strip the "sha256:" prefix — the merge step re-adds it via @sha256:.
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.guard.outputs.publish == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [guard, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # write the multi-arch manifest tag
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble multi-arch manifest (:version + :latest)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.guard.outputs.version }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE}:${{ needs.guard.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Container image: \`docker pull ${IMAGE}:${{ needs.guard.outputs.version }}\` (also tagged \`latest\`; linux/amd64 + linux/arm64)."
